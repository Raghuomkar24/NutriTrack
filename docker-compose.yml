version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: nutritrack_db
    restart: always
    environment:
      MYSQL_DATABASE: nutritrack_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: nutritrack_backend
    restart: always
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/nutritrack_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - OPENAI_API_KEY=mock-key
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: nutritrack_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
