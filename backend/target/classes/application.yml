server:
  port: 8085

spring:
  application:
    name: nutritrack-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/nutritrack_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Custom Security & JWT Settings
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970} # 256-bit Hex Key
    expirationMs: 86400000 # 24 Hours
    refreshExpirationMs: 604800000 # 7 Days

# Cloudinary Storage Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}

# OpenAI API Settings (Nutrition Coach & Meal recognition)
openai:
  api-key: ${OPENAI_API_KEY:mock-key}
  model: ${OPENAI_MODEL:gpt-4o}

# External API Integrations
external-apis:
  usda:
    api-key: ${USDA_API_KEY:DEMO_KEY}
    url: https://api.nal.usda.gov/fdc/v1
  openfoodfacts:
    url: https://world.openfoodfacts.org/api/v2

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
